name: Deploy gitwiki client to GitHub Pages

# Builds the static client (esbuild -> public/bundle.js) and publishes the
# public/ folder to GitHub Pages. This deploys the APP only; it opens any repo
# via ?repo=owner/name and authenticates each visitor with their own GitHub
# account (client OAuth mode), so public/config.js must point at your Supabase.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: touch public/.nojekyll   # don't let Pages' Jekyll touch the assets
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
